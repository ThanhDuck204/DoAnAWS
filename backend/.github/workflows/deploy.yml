name: Backend CI and Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  deploy-infra:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: backend/infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-ai-meeting-workforce
          aws-region: ap-southeast-1
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -var="name=ai-meeting-workforce-${{ inputs.environment || 'dev' }}" -var="environment=${{ inputs.environment || 'dev' }}"
      - run: terraform apply -auto-approve -var="name=ai-meeting-workforce-${{ inputs.environment || 'dev' }}" -var="environment=${{ inputs.environment || 'dev' }}"
