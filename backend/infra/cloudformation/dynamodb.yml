AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal DynamoDB table for AI Meeting Workforce backend

Parameters:
  TableName:
    Type: String
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  LowCostMode:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"

Conditions:
  EnablePitr: !Or
    - !Equals [!Ref Environment, prod]
    - !Equals [!Ref LowCostMode, "false"]

Resources:
  MainTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [EnablePitr, true, false]
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Service
          Value: ai-meeting-workforce-backend
        - Key: Environment
          Value: !Ref Environment

Outputs:
  TableName:
    Value: !Ref MainTable
