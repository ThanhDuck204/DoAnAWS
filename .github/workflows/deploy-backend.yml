name: Backend Deploy — Lambda + Infra

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  NODE_VERSION: "22"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm install
      - run: npm run build

      - name: Bundle Lambda with esbuild
        run: |
          npm install --save-dev esbuild
          npx esbuild dist/lambda-handler.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --outfile=dist/bundle.js \
            --external:@aws-sdk/*

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BACKEND }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda (esbuild bundle)
        run: |
          zip -j bundle-deploy.zip dist/bundle.js
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://bundle-deploy.zip \
            --region ${{ env.AWS_REGION }}
